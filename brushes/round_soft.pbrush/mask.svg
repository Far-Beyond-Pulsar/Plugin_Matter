<svg width="64" height="64" xmlns="http://www.w3.org/2000/svg">
  <!--
    Round Soft brush mask.
    Channel encoding (after RGBA rasterisation):
      R = intensity   — radial gradient from white (full) to black (zero)
      G = reflectiveness — 0 (same as R in grayscale; ignored for colour paint)
      B = smear       — 0 (same as R in grayscale; ignored for colour paint)
      A = roughness   — fully opaque inside shape, transparent outside
  -->
  <defs>
    <radialGradient id="g" cx="50%" cy="50%" r="50%">
      <stop offset="0%"   stop-color="white"/>
      <stop offset="45%"  stop-color="#c8c8c8"/>
      <stop offset="75%"  stop-color="#707070"/>
      <stop offset="100%" stop-color="black"/>
    </radialGradient>
  </defs>
  <circle cx="32" cy="32" r="32" fill="url(#g)"/>
</svg>
