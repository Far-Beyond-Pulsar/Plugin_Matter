<svg width="64" height="64" xmlns="http://www.w3.org/2000/svg">
  <!--
    Texture Rough brush mask.
    Multiple overlapping translucent circles create an irregular, gritty texture.
    Bright areas = high intensity (paint applied); dark gaps = lower intensity.
  -->
  <!-- Base coverage disc -->
  <circle cx="32" cy="32" r="27" fill="#d8d8d8"/>
  <!-- Bright texture clusters -->
  <circle cx="22" cy="25" r="12" fill="white"   opacity="0.50"/>
  <circle cx="41" cy="20" r="10" fill="#ececec"  opacity="0.55"/>
  <circle cx="44" cy="38" r="11" fill="white"   opacity="0.48"/>
  <circle cx="28" cy="45" r="10" fill="#e4e4e4"  opacity="0.52"/>
  <circle cx="20" cy="40" r="9"  fill="#d0d0d0"  opacity="0.42"/>
  <circle cx="36" cy="12" r="8"  fill="#f0f0f0"  opacity="0.50"/>
  <circle cx="14" cy="30" r="7"  fill="white"   opacity="0.38"/>
  <!-- Dark texture pits -->
  <circle cx="30" cy="28" r="4"  fill="#505050"  opacity="0.35"/>
  <circle cx="41" cy="32" r="3"  fill="#686868"  opacity="0.30"/>
  <circle cx="26" cy="37" r="3"  fill="#5a5a5a"  opacity="0.32"/>
  <circle cx="37" cy="22" r="3"  fill="#707070"  opacity="0.25"/>
  <circle cx="18" cy="20" r="4"  fill="#606060"  opacity="0.28"/>
  <circle cx="47" cy="28" r="3"  fill="#5c5c5c"  opacity="0.27"/>
</svg>
